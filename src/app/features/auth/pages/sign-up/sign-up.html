<div class="left">
  <div class="art-logo">
    <!-- biome-ignore lint/a11y/noSvgWithoutTitle: <explanation> -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path
        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
      ></path>
      <path d="M3.3 7l8.7 5 8.7-5"></path>
      <path d="M12 22V12"></path>
    </svg>
  </div>
</div>

<div class="right">
  <div class="card">
    <h1 class="title">Crie sua conta</h1>

    <form [formGroup]="signUpForm" (ngSubmit)="actionSubmit()">
      <app-textbox id="name" label="Nome" formControlName="name" />

      <app-textbox id="email" label="Email" formControlName="email" />

      <app-password id="password" label="Senha" formControlName="password" />

      <app-password
        id="confirmPassword"
        label="Confirme a Senha"
        formControlName="confirmPassword"
      />

      <app-button type="submit" [fullWidth]="true">Criar conta</app-button>
    </form>

    <div class="footer-container">
      <span class="separator"></span>

      <div class="footer" (click)="actionNavigateToSignIn()">
        <div class="footer-left">
          <lucide-icon [name]="badgePlus" size="20" color="var(--primary)"></lucide-icon>

          <div>
            <p>Já tem uma conta?</p>
            <a href="#">Acesse sua conta</a>
          </div>
        </div>

        <div class="footer-right">
          <lucide-icon [name]="chevronRight" size="16"></lucide-icon>
        </div>
      </div>
    </div>
  </div>
</div>
