<app-header />

<main>
  <div class="home-intro">
    <div>
      <h2>Olá, {{ userName$ | async }}</h2>
      <p>Gerencie suas despesas de forma inteligente</p>
    </div>

    <div class="home-actions">
      <app-button-dropdown>
        Adicionar
        <div class="dropdown-menu">
          <button type="button" role="menuitem" (click)="openNewIncomeModal()">Nova receita</button>
          <button type="button" role="menuitem" (click)="openNewExpenseModal()">
            Nova despesa
          </button>
        </div>
      </app-button-dropdown>
    </div>
  </div>

  <div class="cards">
    @for (card of cards(); track $index) {
      <app-summary-card
        [title]="card.title"
        [value]="card.value"
        [icon]="card.icon"
        [change]="card.change"
        [type]="card.type"
        [highlight]="card.highlight"
      />
    }
  </div>

  <app-latest-ledger-panel
    [incomes]="incomes()"
    [expenses]="expenses()"
    [incomesLoading]="incomesLoading()"
    [expensesLoading]="expensesLoading()"
    (viewAll)="onViewAllLedger($event)"
    (rowEdit)="onLedgerRowEdit($event)"
  />
</main>
