<app-header />

<main>
  <div class="home-intro">
    <div>
      <h2>Olá, {{ userName$ | async }}</h2>
      <p>Gerencie suas despesas de forma inteligente</p>
    </div>

    <app-button type="button" (clicked)="openNewExpenseModal()">Nova despesa</app-button>
  </div>

  <div class="cards">
    @for (card of cards; track $index) {
      <app-summary-card
        [title]="card.title"
        [value]="card.value"
        [icon]="card.icon"
        [change]="card.change"
        [type]="card.type"
        [highlight]="card.highlight"
      />
    }
  </div>

  <section class="expenses-section">
    <div class="expenses-header">
      <div>
        <h3 class="expenses-title">Despesas</h3>
        <p class="expenses-subtitle">{{ currentMonthLabel }}</p>
      </div>
    </div>

    <app-table
      [columns]="expenseColumns"
      [rows]="expensesRows()"
      [loading]="expensesLoading()"
      emptyMessage="Nenhuma despesa registrada neste mês."
      (deleteClick)="deleteExpense($event)"
    />
  </section>
</main>
