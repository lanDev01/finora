<app-header />

<main>
  <div class="home-intro">
    <div>
      <h2>Olá, {{ userName$ | async }}</h2>
      <p>Gerencie suas despesas de forma inteligente</p>
    </div>

    <div class="home-actions">
      <app-button-dropdown>
        Adicionar
        <div class="dropdown-menu">
          <button type="button" role="menuitem" (click)="openNewIncomeModal()">Nova receita</button>
          <button type="button" role="menuitem" (click)="openNewExpenseModal()">Nova despesa</button>
        </div>
      </app-button-dropdown>
    </div>
  </div>

  <div class="cards">
    @for (card of cards; track $index) {
      <app-summary-card
        [title]="card.title"
        [value]="card.value"
        [icon]="card.icon"
        [change]="card.change"
        [type]="card.type"
        [highlight]="card.highlight"
      />
    }
  </div>

  <section class="ledger-section">
    <div class="ledger-header">
      <div>
        <h3 class="ledger-title">Receitas</h3>
        <p class="ledger-subtitle">{{ currentMonthLabel }}</p>
      </div>
    </div>

    <app-table
      [columns]="incomeColumns"
      [rows]="incomesRows()"
      [loading]="incomesLoading()"
      emptyMessage="Nenhuma receita registrada neste mês."
      (deleteClick)="deleteIncome($event)"
    />
  </section>

  <section class="ledger-section">
    <div class="ledger-header">
      <div>
        <h3 class="ledger-title">Despesas</h3>
        <p class="ledger-subtitle">{{ currentMonthLabel }}</p>
      </div>
    </div>

    <app-table
      [columns]="expenseColumns"
      [rows]="expensesRows()"
      [loading]="expensesLoading()"
      emptyMessage="Nenhuma despesa registrada neste mês."
      (deleteClick)="deleteExpense($event)"
    />
  </section>
</main>
