<app-modal title="Atualizar senha" subtitle="Altere a senha da sua conta" (closed)="onClose()">
  @if (isSocialUser()) {
    <div class="social-notice">
      <lucide-icon [img]="infoIcon" [size]="18" class="social-notice-icon" />
      <div class="social-notice-text">
        <strong>Login social ativo</strong>
        <p>Sua conta está vinculada a um provedor externo (GitHub ou Google). Não é necessário definir uma senha.</p>
      </div>
    </div>

    <div class="form-actions">
      <app-button type="button" variant="ghost" (clicked)="onClose()">Fechar</app-button>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <app-password label="Senha atual" placeholder="Sua senha atual" formControlName="currentPassword" />
      </div>

      <div class="form-divider"></div>

      <div class="form-group">
        <app-password label="Nova senha" placeholder="Mínimo 8 caracteres" formControlName="newPassword" />
      </div>

      <div class="form-group">
        <app-password label="Confirmar nova senha" placeholder="Repita a nova senha" formControlName="confirmPassword" />
        @if (passwordMismatch) {
          <p class="field-error">As senhas não coincidem.</p>
        }
      </div>

      <div class="form-actions">
        <app-button type="button" variant="ghost" (clicked)="onClose()">Cancelar</app-button>
        <app-button type="submit" [disabled]="form.invalid || saving">
          {{ saving ? 'Salvando...' : 'Salvar senha' }}
        </app-button>
      </div>
    </form>
  }
</app-modal>
