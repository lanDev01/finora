@if (showImage()) {
  <img
    class="avatar-image"
    [src]="avatarUrl()!"
    referrerpolicy="no-referrer"
    [alt]="name() ?? 'Avatar do usuário'"
    (error)="onImageError()"
  />
} @else {
  <span class="avatar-initials" [attr.aria-label]="'Avatar de ' + (name() ?? 'usuário')">
    {{ initials() }}
  </span>
}
