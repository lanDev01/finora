<div class="dropdown-root">
  <button
    type="button"
    class="button"
    [disabled]="disabled() || loading()"
    [attr.aria-expanded]="open()"
    [attr.aria-label]="triggerAriaLabel() ?? null"
    aria-haspopup="menu"
    (click)="onTriggerClick($event)"
  >
    @if (loading()) {
      <span class="spinner" aria-hidden="true"></span>
    }

    <span class="trigger-inner">
      <span class="trigger-label">
        <ng-content />
      </span>
      @if (showChevron()) {
        <lucide-icon [name]="chevronIcon" class="chevron" [class.chevron-open]="open()" size="18" />
      }
    </span>
  </button>

  <div
    class="panel"
    [class.panel--overlay]="panelMode() === 'overlay'"
    [hidden]="!open()"
    role="menu"
    (click)="onPanelClick($event)"
    [style.top.px]="panelMode() === 'overlay' && open() ? overlayTop() : null"
    [style.left.px]="panelMode() === 'overlay' && open() ? overlayLeft() : null"
    [style.minWidth.px]="panelMode() === 'overlay' && open() ? overlayMinWidth() : null"
  >
    <ng-content select=".dropdown-menu" />
  </div>
</div>
