<div class="password-wrapper">
  <input
    class="input"
    [type]="visible() ? 'text' : 'password'"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [value]="value"
    (input)="onInput($event)"
  />

  <button type="button" class="toggle" (click)="toggleVisibility()">
    <lucide-icon [name]="visible() ? EyeOff : Eye" size="18"></lucide-icon>
  </button>
</div>
