@if (label()) {
  <app-label [for]="id" [error]="hasError()">{{ label() }}</app-label>
}

<div class="password-wrapper">
  <app-input
    [id]="id"
    [type]="visible() ? 'text' : 'password'"
    [placeholder]="placeholder()"
    [size]="size()"
    [disabled]="disabled()"
    [formControl]="control"
    [error]="hasError()"
  />

  <button type="button" class="toggle" (click)="toggleVisibility()">
    <lucide-icon [name]="visible() ? EyeOff : Eye" size="18"></lucide-icon>
  </button>
</div>
